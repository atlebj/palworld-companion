<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#334155">Oil Rig Stronghold: Key Loot Locations</text>

  <!-- Base Layout -->
  <rect x="100" y="80" width="600" height="280" fill="#e2e8f0" stroke="#475569" stroke-width="4" rx="4" />

  <!-- Platforms -->
  <rect x="120" y="100" width="150" height="100" fill="#94a3b8" stroke="#334155" />
  <text x="195" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="white">Helipad (West)</text>

  <rect x="530" y="100" width="150" height="100" fill="#94a3b8" stroke="#334155" />
  <text x="605" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="white">Cargo Bay (East)</text>

  <rect x="300" y="200" width="200" height="140" fill="#64748b" stroke="#334155" />
  <text x="400" y="270" font-family="sans-serif" font-size="18" text-anchor="middle" fill="white" font-weight="bold">Central Command</text>

  <!-- Loot Boxes -->
  <circle cx="200" cy="180" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2" />
  <text x="200" y="185" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#78350f" font-weight="bold">$</text>

  <circle cx="600" cy="180" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2" />
  <text x="600" y="185" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#78350f" font-weight="bold">$</text>

  <circle cx="400" cy="230" r="20" fill="#a855f7" stroke="#6b21a8" stroke-width="2" />
  <text x="400" y="235" font-family="sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">BOSS</text>

  <!-- Labels -->
  <text x="200" y="210" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#334155">Supply Chest</text>
  <text x="600" y="210" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#334155">Ammo Cache</text>
  <text x="400" y="320" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#f1f5f9" font-weight="bold">Main Reward: Legendary Schematic</text>

  <!-- Turrets -->
  <path d="M120,360 L140,330 L160,360 Z" fill="#ef4444" />
  <text x="140" y="375" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#ef4444">Laser Turret</text>

  <path d="M640,360 L660,330 L680,360 Z" fill="#ef4444" />
  <text x="660" y="375" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#ef4444">Laser Turret</text>

</svg>