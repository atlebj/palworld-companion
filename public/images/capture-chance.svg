<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#334155">Catch Rate vs. Sphere Tier (Low HP Legendary)</text>

  <!-- Axes -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#94a3b8" stroke-width="2" />
  <line x1="100" y1="350" x2="100" y2="80" stroke="#94a3b8" stroke-width="2" />

  <!-- Y-Axis Labels -->
  <text x="90" y="350" font-family="sans-serif" font-size="14" text-anchor="end" fill="#64748b">0%</text>
  <text x="90" y="215" font-family="sans-serif" font-size="14" text-anchor="end" fill="#64748b">50%</text>
  <text x="90" y="80" font-family="sans-serif" font-size="14" text-anchor="end" fill="#64748b">100%</text>

  <!-- Bars -->
  <!-- Poke Ball (Base) ~ 1% -->
  <rect x="130" y="345" width="80" height="5" fill="#ef4444" rx="4" />
  <text x="170" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Blue Sphere</text>
  <text x="170" y="340" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#ef4444" font-weight="bold">1%</text>

  <!-- Mega Sphere (Green) ~ 5% -->
  <rect x="230" y="335" width="80" height="15" fill="#22c55e" rx="4" />
  <text x="270" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Green Sphere</text>
  <text x="270" y="330" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#22c55e" font-weight="bold">5%</text>

  <!-- Giga Sphere (Yellow) ~ 15% -->
  <rect x="330" y="310" width="80" height="40" fill="#eab308" rx="4" />
  <text x="370" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Yellow Sphere</text>
  <text x="370" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#eab308" font-weight="bold">15%</text>

  <!-- Hyper Sphere (Red) ~ 35% -->
  <rect x="430" y="255" width="80" height="95" fill="#f97316" rx="4" />
  <text x="470" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Red Sphere</text>
  <text x="470" y="250" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#f97316" font-weight="bold">35%</text>

  <!-- Ultra Sphere (Purple) ~ 65% -->
  <rect x="530" y="175" width="80" height="175" fill="#a855f7" rx="4" />
  <text x="570" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Pink Sphere</text>
  <text x="570" y="170" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#a855f7" font-weight="bold">65%</text>

  <!-- Legendary Sphere (Blue/Gold) ~ 95% -->
  <rect x="630" y="95" width="80" height="255" fill="#3b82f6" rx="4" />
  <text x="670" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Legend Sphere</text>
  <text x="670" y="90" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#3b82f6" font-weight="bold">95%</text>
</svg>