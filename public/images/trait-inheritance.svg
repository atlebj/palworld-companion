<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#334155">Breeding Trait Inheritance Example</text>

  <!-- Parent A -->
  <rect x="150" y="80" width="150" height="100" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2" rx="8" />
  <text x="225" y="110" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#1e3a8a">Parent A</text>
  <text x="225" y="135" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#1e3a8a">• Ferocious</text>
  <text x="225" y="155" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#1e3a8a">• Musclehead</text>

  <!-- Parent B -->
  <rect x="500" y="80" width="150" height="100" fill="#fce7f3" stroke="#db2777" stroke-width="2" rx="8" />
  <text x="575" y="110" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#831843">Parent B</text>
  <text x="575" y="135" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#831843">• Legend</text>
  <text x="575" y="155" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#831843">• Divine Dragon</text>

  <!-- Child -->
  <rect x="325" y="250" width="150" height="120" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8" />
  <text x="400" y="280" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#14532d">Child</text>
  <text x="400" y="305" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#14532d">• Ferocious</text>
  <text x="400" y="325" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#14532d">• Musclehead</text>
  <text x="400" y="345" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#14532d">• Legend</text>
  <text x="400" y="365" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#14532d">• Divine Dragon</text>

  <!-- Arrows -->
  <line x1="225" y1="180" x2="325" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="575" y1="180" x2="475" y2="250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />

  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>