<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ti-title">
  <title id="ti-title">Breeding trait inheritance: parent passives can be inherited by the child</title>

  <!-- Background matches --color-brand-bg-card so the SVG melts into the page card -->
  <rect width="100%" height="100%" fill="#1a1f2b" rx="14" />

  <!-- Heading -->
  <text x="400" y="44" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="22" text-anchor="middle" font-weight="700" fill="#E6E9F2">
    Breeding Trait Inheritance Example
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5B7CFF" />
    </marker>
  </defs>

  <!-- Parent A (cool blue, like the site primary) -->
  <rect x="120" y="86" width="180" height="108" rx="12"
        fill="rgba(91,124,255,0.12)" stroke="#5B7CFF" stroke-width="2" />
  <text x="210" y="118" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17"
        text-anchor="middle" font-weight="700" fill="#A6B6FF">Parent A</text>
  <text x="210" y="146" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Ferocious</text>
  <text x="210" y="168" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Musclehead</text>

  <!-- Parent B (warm magenta accent) -->
  <rect x="500" y="86" width="180" height="108" rx="12"
        fill="rgba(232,121,198,0.10)" stroke="#E879C6" stroke-width="2" />
  <text x="590" y="118" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17"
        text-anchor="middle" font-weight="700" fill="#F1A8DA">Parent B</text>
  <text x="590" y="146" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Legend</text>
  <text x="590" y="168" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Divine Dragon</text>

  <!-- Arrows from parents down to the child -->
  <line x1="240" y1="194" x2="370" y2="246"
        stroke="#5B7CFF" stroke-width="2.5" stroke-opacity="0.8" marker-end="url(#arrow)" />
  <line x1="560" y1="194" x2="430" y2="246"
        stroke="#E879C6" stroke-width="2.5" stroke-opacity="0.8" marker-end="url(#arrow)" />

  <!-- Child (success green to keep "winner" semantics) -->
  <rect x="300" y="248" width="200" height="128" rx="12"
        fill="rgba(52,211,153,0.10)" stroke="#34D399" stroke-width="2" />
  <text x="400" y="280" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17"
        text-anchor="middle" font-weight="700" fill="#6EE7B7">Child</text>
  <text x="400" y="306" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Ferocious</text>
  <text x="400" y="326" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Musclehead</text>
  <text x="400" y="346" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Legend</text>
  <text x="400" y="366" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13"
        text-anchor="middle" fill="#E6E9F2">• Divine Dragon</text>
</svg>
