<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#334155">PvP Arena Team Composition (Meta 2026)</text>

  <!-- Team A (Left) -->
  <rect x="50" y="80" width="300" height="250" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8" />
  <text x="200" y="110" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#991b1b">Aggro Burst Team</text>

  <circle cx="100" cy="160" r="30" fill="#f87171" />
  <text x="100" y="165" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">DPS</text>
  <text x="150" y="165" font-family="sans-serif" font-size="14" fill="#991b1b">Shadowbeak (Dark)</text>

  <circle cx="100" cy="230" r="30" fill="#f87171" />
  <text x="100" y="235" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">CC</text>
  <text x="150" y="235" font-family="sans-serif" font-size="14" fill="#991b1b">Frostallion (Ice)</text>

  <circle cx="100" cy="300" r="30" fill="#f87171" />
  <text x="100" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Supp</text>
  <text x="150" y="305" font-family="sans-serif" font-size="14" fill="#991b1b">Bellanoir Libero</text>

  <!-- VS -->
  <text x="400" y="220" font-family="sans-serif" font-size="32" text-anchor="middle" font-weight="bold" fill="#94a3b8">VS</text>

  <!-- Team B (Right) -->
  <rect x="450" y="80" width="300" height="250" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8" />
  <text x="600" y="110" font-family="sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#1e40af">Stall & Counter Team</text>

  <circle cx="500" cy="160" r="30" fill="#60a5fa" />
  <text x="500" y="165" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Tank</text>
  <text x="550" y="165" font-family="sans-serif" font-size="14" fill="#1e40af">Paladius (Neutral)</text>

  <circle cx="500" cy="230" r="30" fill="#60a5fa" />
  <text x="500" y="235" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Heal</text>
  <text x="550" y="235" font-family="sans-serif" font-size="14" fill="#1e40af">Lyleen Noct</text>

  <circle cx="500" cy="300" r="30" fill="#60a5fa" />
  <text x="500" y="305" font-family="sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">AoE</text>
  <text x="550" y="305" font-family="sans-serif" font-size="14" fill="#1e40af">Jetragon (Dragon)</text>

</svg>