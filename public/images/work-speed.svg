<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#334155">Work Speed Comparison (Same Pal, Base Level 1)</text>

  <!-- Axes -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#94a3b8" stroke-width="2" />
  <line x1="100" y1="350" x2="100" y2="80" stroke="#94a3b8" stroke-width="2" />

  <!-- Y-Axis Labels -->
  <text x="90" y="350" font-family="sans-serif" font-size="14" text-anchor="end" fill="#64748b">0</text>
  <text x="90" y="215" font-family="sans-serif" font-size="14" text-anchor="end" fill="#64748b">100</text>
  <text x="90" y="80" font-family="sans-serif" font-size="14" text-anchor="end" fill="#64748b">200</text>

  <!-- Bars -->
  <!-- Base (100%) -->
  <rect x="130" y="215" width="80" height="135" fill="#94a3b8" rx="4" />
  <text x="170" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">No Traits</text>
  <text x="170" y="210" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b" font-weight="bold">100 (Base)</text>

  <!-- Serious (+20%) -->
  <rect x="230" y="188" width="80" height="162" fill="#22c55e" rx="4" />
  <text x="270" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Serious</text>
  <text x="270" y="183" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#22c55e" font-weight="bold">120 (+20%)</text>

  <!-- Artisan (+50%) -->
  <rect x="330" y="147" width="80" height="203" fill="#eab308" rx="4" />
  <text x="370" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Artisan</text>
  <text x="370" y="142" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#eab308" font-weight="bold">150 (+50%)</text>

  <!-- Lucky (+15%) -->
  <rect x="430" y="195" width="80" height="155" fill="#f97316" rx="4" />
  <text x="470" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Lucky</text>
  <text x="470" y="190" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#f97316" font-weight="bold">115 (+15%)</text>

  <!-- Work Slave (+30%) -->
  <rect x="530" y="174" width="80" height="176" fill="#ef4444" rx="4" />
  <text x="570" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Work Slave</text>
  <text x="570" y="169" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#ef4444" font-weight="bold">130 (+30%)</text>

  <!-- All Combined (+115%) -->
  <rect x="630" y="60" width="80" height="290" fill="#a855f7" rx="4" />
  <text x="670" y="370" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Perfect Worker</text>
  <text x="670" y="55" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#a855f7" font-weight="bold">215 (+115%)</text>
</svg>