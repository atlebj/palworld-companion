<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" style="background-color: #0f172a;">
  <!-- Ocean Background -->
  <rect width="800" height="600" fill="#0f172a" />

  <!-- Grid Lines (Subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Mount Obsidian (Volcano) - SW -->
  <!-- Roughly x=100, y=450 (12%, 75%) -->
  <path d="M 50 450 Q 20 550 120 580 Q 200 550 180 450 Q 150 400 50 450 Z" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" opacity="0.6" />
  <text x="100" y="500" fill="#fca5a5" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Mount Obsidian</text>

  <!-- Astral Mountains (Snow) - NW -->
  <!-- Roughly x=200, y=100 (25%, 16%) -->
  <path d="M 150 50 Q 100 150 200 200 Q 300 150 280 50 Q 240 10 150 50 Z" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" opacity="0.6" />
  <text x="200" y="100" fill="#bfdbfe" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Astral Mountains</text>

  <!-- Desiccated Desert - NE -->
  <!-- Roughly x=550, y=100 (68%, 16%) -->
  <path d="M 500 50 Q 450 150 550 180 Q 650 150 600 50 Q 550 20 500 50 Z" fill="#713f12" stroke="#eab308" stroke-width="2" opacity="0.6" />
  <text x="550" y="100" fill="#fde047" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Desiccated Desert</text>

  <!-- Windswept Hills (Forest/Starter) - Center/SE -->
  <!-- Roughly x=350, y=350 (43%, 58%) -->
  <path d="M 300 300 Q 250 400 400 450 Q 550 400 500 300 Q 400 200 300 300 Z" fill="#14532d" stroke="#22c55e" stroke-width="2" opacity="0.6" />
  <text x="400" y="350" fill="#86efac" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Windswept Hills</text>

  <!-- Marsh Island / Eastern Wild - East -->
  <!-- Roughly x=600, y=350 (75%, 58%) -->
  <path d="M 550 300 Q 500 350 600 400 Q 700 350 650 250 Q 600 230 550 300 Z" fill="#064e3b" stroke="#10b981" stroke-width="2" opacity="0.6" />
  <text x="600" y="330" fill="#6ee7b7" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Marsh Island</text>

  <!-- Sakurajima - NW/Central -->
  <!-- Roughly x=150, y=250 (18%, 41%) -->
  <path d="M 100 250 Q 50 300 130 330 Q 170 300 150 230 Q 130 200 100 250 Z" fill="#831843" stroke="#f472b6" stroke-width="2" opacity="0.6" />
  <text x="120" y="280" fill="#fbcfe8" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Sakurajima</text>

</svg>